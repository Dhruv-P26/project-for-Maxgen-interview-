<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Portfolio Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f4068, #162447);
            color: #e4e4e4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #0f172a;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 500px;
            border: 1px solid #1e293b;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
        }

        .badge {
            display: inline-block;
            background: #0369a1;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-top: 15px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Cloud & DevOps Project</h1>
        <p>This static web page is containerized via Docker, managed with shell automation, and deployed automatically
            through a GitLab CI/CD pipeline.</p>
        <div class="badge">Built for Ahmedabad Tech Internships</div>
    </div>
</body>

</html>
